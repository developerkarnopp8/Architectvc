<nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-sm">
  <div class="flex justify-between items-center h-16 px-6 md:px-12 max-w-7xl mx-auto relative">

    <!-- Logo -->
    <a routerLink="/" class="text-xl font-extrabold tracking-tighter text-primary font-headline uppercase">
      Architect CV
    </a>

    <!-- Desktop Nav Links -->
    <div class="hidden md:flex items-center gap-8 font-label font-semibold text-sm">
      <a routerLink="/"
         routerLinkActive="text-primary border-b-2 border-primary pb-1"
         [routerLinkActiveOptions]="{ exact: true }"
         class="text-secondary hover:text-primary transition-colors">
        Home
      </a>
      <a routerLink="/templates"
         routerLinkActive="text-primary border-b-2 border-primary pb-1"
         class="text-secondary hover:text-primary transition-colors">
        Templates
      </a>
      @if (isLoggedIn()) {
        <a routerLink="/dashboard"
           routerLinkActive="text-primary border-b-2 border-primary pb-1"
           class="text-secondary hover:text-primary transition-colors">
          Meus Currículos
        </a>
      }
    </div>

    <!-- Desktop Auth Buttons -->
    <div class="hidden md:flex items-center gap-4">
      @if (!isLoggedIn()) {
        <a routerLink="/auth/login"
           class="font-label font-semibold text-sm text-secondary hover:text-primary transition-colors px-4 py-2">
          Login
        </a>
        <a routerLink="/auth/register"
           class="bg-primary text-on-primary font-label font-semibold text-sm px-6 py-2 rounded-xl shadow-md hover:opacity-90 transition-all">
          Criar Conta
        </a>
      } @else {
        <span class="font-label text-sm text-secondary">Olá, {{ firstName() }}</span>
        <button (click)="logout()"
          class="font-label font-semibold text-sm text-secondary hover:text-primary transition-colors px-4 py-2">
          Sair
        </button>
      }
    </div>

    <!-- Mobile Menu Button -->
    <button
      class="md:hidden p-2 text-secondary hover:text-primary transition-colors"
      (click)="toggleMenu()"
      aria-label="Abrir menu">
      <span class="material-symbols-outlined">{{ menuOpen() ? 'close' : 'menu' }}</span>
    </button>

    <!-- Separator line -->
    <div class="absolute bottom-0 left-0 right-0 h-[1px] bg-outline-variant opacity-30"></div>
  </div>

  <!-- Mobile Menu Dropdown -->
  @if (menuOpen()) {
    <div class="md:hidden bg-white border-t border-outline-variant/20 px-6 py-4 flex flex-col gap-4">
      <a routerLink="/" (click)="closeMenu()"
         class="font-label font-semibold text-sm text-secondary hover:text-primary transition-colors py-2">
        Home
      </a>
      <a routerLink="/templates" (click)="closeMenu()"
         class="font-label font-semibold text-sm text-secondary hover:text-primary transition-colors py-2">
        Templates
      </a>
      @if (isLoggedIn()) {
        <a routerLink="/dashboard" (click)="closeMenu()"
           class="font-label font-semibold text-sm text-secondary hover:text-primary transition-colors py-2">
          Meus Currículos
        </a>
      }
      <div class="flex flex-col gap-3 pt-2 border-t border-outline-variant/20">
        @if (!isLoggedIn()) {
          <a routerLink="/auth/login" (click)="closeMenu()"
             class="w-full text-center py-3 rounded-xl font-label font-semibold text-sm text-primary border border-primary/20 hover:bg-primary/5 transition-all">
            Login
          </a>
          <a routerLink="/auth/register" (click)="closeMenu()"
             class="w-full text-center py-3 rounded-xl font-label font-semibold text-sm bg-primary text-on-primary hover:opacity-90 transition-all">
            Criar Conta
          </a>
        }
      </div>
    </div>
  }
</nav>
